name: Build cPanel runtime

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-runtime:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      WHATSAPP_MODE: remote_worker
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_APP_LOCALE: pt

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Check Linux CSS/runtime resolution
        run: |
          node -e "for (const m of ['tailwindcss','@tailwindcss/postcss','lightningcss']) { console.log(m + ' => ' + require.resolve(m)) }"
          node -e "const fs=require('fs'); for (const p of ['node_modules/shadcn/dist/tailwind.css','node_modules/tw-animate-css/dist/tw-animate.css']) { if (!fs.existsSync(p)) { throw new Error(p + ' not found') } console.log(p + ' OK') }"

      - name: Build Next.js standalone runtime
        run: npm run build:cpanel

      - name: Assemble cPanel runtime branch
        shell: bash
        run: |
          rm -rf cpanel-runtime
          mkdir -p cpanel-runtime/.next
          cp -a .next/standalone/. cpanel-runtime/
          cp -a .next/static cpanel-runtime/.next/static
          cp -a public cpanel-runtime/public
          cat > cpanel-runtime/README.md <<'EOF'
          # AJ Massagem CRM cPanel runtime

          Esta branch e gerada automaticamente pelo GitHub Actions.

          No cPanel:
          - Branch: cpanel-runtime
          - Application startup file: server.js
          - Nao execute `npm install`
          - Nao execute `npm run build`
          - Configure as variaveis de ambiente no Setup Node.js App
          - Use Restart Application apos cada pull
          EOF

      - name: Publish cPanel runtime branch
        shell: bash
        run: |
          cd cpanel-runtime
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Build cPanel runtime from ${GITHUB_SHA}"
          git branch -M cpanel-runtime
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin cpanel-runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
