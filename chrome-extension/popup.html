<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AJ CRM</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        width: 360px;
        margin: 0;
        background: #f7f8fa;
        color: #17202a;
      }

      .wrap {
        padding: 16px;
      }

      h1 {
        margin: 0;
        font-size: 17px;
        line-height: 1.2;
      }

      p {
        margin: 6px 0 0;
        color: #667085;
        font-size: 12px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin-top: 14px;
        font-size: 12px;
        font-weight: 700;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        padding: 10px 11px;
        outline: none;
        background: #fff;
        color: #101828;
        font-size: 13px;
      }

      input:focus {
        border-color: #ef5b45;
        box-shadow: 0 0 0 3px rgba(239, 91, 69, 0.14);
      }

      .row {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 700;
        font-size: 13px;
      }

      #save {
        flex: 1;
        background: #ef5b45;
        color: #fff;
      }

      #openWhatsapp {
        background: #fff;
        color: #17202a;
        border: 1px solid #d0d5dd;
      }

      .status {
        display: none;
        margin-top: 12px;
        border-radius: 8px;
        padding: 9px 10px;
        background: #ecfdf3;
        color: #027a48;
        font-size: 12px;
        font-weight: 700;
      }

      .hint {
        margin-top: 14px;
        border-top: 1px solid #eaecf0;
        padding-top: 12px;
        font-size: 11px;
        color: #667085;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>AJ CRM no WhatsApp Web</h1>
      <p>
        Configure a URL do CRM e uma chave de API para consultar/criar clientes
        a partir do WhatsApp Web.
      </p>

      <label for="crmUrl">URL do CRM</label>
      <input
        id="crmUrl"
        placeholder="https://suporte.ajmassagem.pt"
        autocomplete="off"
      />

      <label for="apiKey">API key do CRM</label>
      <input
        id="apiKey"
        placeholder="wacrm_live_..."
        autocomplete="off"
        type="password"
      />

      <div class="row">
        <button id="save" type="button">Salvar</button>
        <button id="openWhatsapp" type="button">Abrir WhatsApp</button>
      </div>

      <div id="status" class="status">Configuração salva.</div>

      <div class="hint">
        A API key precisa ter escopos de contatos, como
        <strong>contacts:read</strong> e <strong>contacts:write</strong>.
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
